    .gallery { max-width: 1200px; margin: 0 auto; padding: 0 32px 120px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    .gallery-col { display: flex; flex-direction: column; gap: 16px; }
    .gallery-item { overflow: hidden; }
    .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }
    @media (max-width: 600px) { header { padding: 16px 20px; } .page-title { padding: 100px 20px 32px; } .gallery { padding: 0 20px 80px; gap: 8px; } }
