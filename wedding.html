<!DOCTYPE html>

  <style>
    @font-face { font-family: 'MidashiGo-MB31'; src: url('fonts/MidashiGo-MB31.otf') format('opentype'); font-weight: bold; font-style: normal; font-display: swap; }
    @font-face { font-family: 'FuturaKY'; src: url('fonts/FuturaMedium.otf') format('opentype'); font-weight: 400; font-style: normal; font-display: swap; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #111111; --gray: #888; --bg: #fafaf8; --font-midashi: 'MidashiGo-MB31', sans-serif; --font-sans: 'FuturaKY', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    body { background: var(--bg); color: var(--black); font-family: var(--font-sans); }
    a { text-decoration: none; color: inherit; } a:hover { opacity: 0.6; }
    img { display: block; width: 100%; }
    header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 20px 32px; background: rgba(250,250,248,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(0,0,0,0.06); }
    .site-name { font-size: 13px; letter-spacing: 0.1em; }
    .back-link { font-size: 11px; letter-spacing: 0.15em; color: var(--gray); text-transform: uppercase; }
    .page-title { padding: 120px 32px 48px; max-width: 1200px; margin: 0 auto; }
    .page-title .category { font-size: 11px; letter-spacing: 0.2em; color: var(--gray); margin-bottom: 12px; text-transform: uppercase; }
    .page-title h1 { font-size: clamp(32px, 6vw, 72px); font-weight: 500; letter-spacing: 0.08em; }
    .page-title .ja { font-family: var(--font-midashi); font-size: clamp(13px, 1.5vw, 16px); color: var(--gray); margin-top: 8px; }

    .section { max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; }
    .section-label { font-size: 11px; letter-spacing: 0.2em; color: var(--gray); text-transform: uppercase; padding-bottom: 16px; border-bottom: 1px solid #e0e0e0; margin-bottom: 24px; }
    .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
    .gallery-col { display: flex; flex-direction: column; gap: 16px; }
    .gallery-item { overflow: hidden; }
    .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; }
    .gallery-item:hover img { transform: scale(1.03); }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      .page-title { padding: 100px 20px 32px; }
      .section { padding: 0 20px 60px; }
      .gallery { gap: 8px; }
      .gallery-col { gap: 8px; }
    }
  </style>
